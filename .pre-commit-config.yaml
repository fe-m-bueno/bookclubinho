repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0'
        types: [file]
        files: ^frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false
