<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Bookclub</title>
</head>
<body style="margin: 0; padding: 0; background-color: #fdf6ee; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">
  <!-- Preheader text (hidden) -->
  <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">
    {% block preheader %}{% endblock %}
  </div>

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #fdf6ee;">
    <tr>
      <td align="center" style="padding: 32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width: 600px;">

          <!-- Header -->
          <tr>
            <td style="background-color: #F8DFBF; padding: 24px 32px; border-radius: 12px 12px 0 0; text-align: center;">
              <span style="font-size: 24px; font-weight: 700; color: #30261D; letter-spacing: -0.5px;">Bookclub</span>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="background-color: #ffffff; padding: 32px; border-left: 1px solid #e8d9c8; border-right: 1px solid #e8d9c8; color: #30261D; font-size: 16px; line-height: 1.6;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color: #F8DFBF; padding: 20px 32px; border-radius: 0 0 12px 12px; text-align: center; border-left: 1px solid #e8d9c8; border-right: 1px solid #e8d9c8; border-bottom: 1px solid #e8d9c8;">
              <p style="margin: 0 0 8px 0; font-size: 12px; color: #7a6555;">
                Você está recebendo este e-mail porque tem uma conta no Bookclub.
              </p>
              <a href="{{ app_url }}/settings/notifications"
                 style="font-size: 12px; color: #c2410c; text-decoration: underline;">
                Gerenciar notificações
              </a>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
